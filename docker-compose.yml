version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: insta-gen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /DATA/AppData/insta-gen/db:/var/lib/postgresql/data

  nextjs:
    build:
      context: /DATA/AppData/insta-gen/source
      dockerfile: Dockerfile
    container_name: insta-gen-nextjs
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      MEDIA_ROOT: ${MEDIA_ROOT}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres